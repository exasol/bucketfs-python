name: Slow-Checks

on:
  workflow_call:

jobs:
  tests:
    name: Integration-Tests (${{ matrix.backend }}, ${{ matrix.exasol-version}})
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: saas
            exasol-version: provided
          - backend: onprem
            exasol-version: "7.1.30"
          - backend: onprem
            exasol-version: "8.29.13"
          - backend: onprem
            exasol-version: "2025.1.8"

    steps:
      - name: SCM Checkout
        uses: actions/checkout@v5

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v4
        with:
          python-version: "3.10"
          
      # Required for test/integration/test_udf_path.py
      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Run Tests and Collect Coverage
        run: >
          poetry run -- nox -s test:integration -- -s --coverage
          --backend=${{ matrix.backend }}
          --db-version ${{ matrix.exasol-version }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: coverage-slow-${{ matrix.backend }}-${{ matrix.exasol-version }}
          path: .coverage
          include-hidden-files: true
